services:
  boxwatchr:
    build: .
    container_name: boxwatchr
    restart: on-failure
    ports:
      - "${WEB_PORT:-8143}:80"
      - "11334:11334"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./boxwatchr:/app/boxwatchr:ro
      - ./main.py:/app/main.py:ro
    env_file:
      - ./config/.env
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG && curl -sf http://127.0.0.1:11334/ping > /dev/null && curl -sf http://127.0.0.1:80/ > /dev/null && supervisorctl status unbound | grep -q RUNNING && supervisorctl status boxwatchr | grep -q RUNNING"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s