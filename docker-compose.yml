services:
  boxwatchr:
    build: .
    container_name: boxwatchr
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8080"
      - "11334:11334"
    volumes:
      - ./.env:/app/.env:ro
      - ./rules.yaml:/app/rules.yaml:ro
      - ./boxwatchr.db:/app/boxwatchr.db
      # Place custom rspamd config files in ./rspamd/local.d to override
      # rspamd defaults. See https://rspamd.com/doc/configuration/ for options.
      # The worker-controller.inc file is generated automatically from
      # RSPAMD_PASSWORD in your .env file. Do not create it here manually.
      - ./rspamd/local.d:/config/rspamd/local.d:ro
    env_file:
      - .env