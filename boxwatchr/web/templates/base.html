<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}boxwatchr{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body>
    <nav class="navbar navbar-expand-sm site-nav border-bottom px-3 px-sm-4">
        <a class="navbar-brand site-brand fw-bold" href="/">boxwatchr</a>
        <button class="navbar-toggler border-0 ms-auto" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMenu"
                aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse ms-sm-3" id="navMenu">
            <div class="d-flex flex-column flex-sm-row gap-2 py-2 py-sm-0 align-items-sm-center w-100">
                {% if not setup_mode %}
                <a href="/" class="nav-link site-nav-link{% if request.path == '/' %} active{% endif %}">stats</a>
                <a href="/emails" class="nav-link site-nav-link{% if request.path.startswith('/emails') %} active{% endif %}">emails</a>
                <a href="/logs" class="nav-link site-nav-link{% if request.path == '/logs' %} active{% endif %}">logs</a>
                <a href="/rules" class="nav-link site-nav-link{% if request.path.startswith('/rules') %} active{% endif %}">rules</a>
                <a href="/config" class="nav-link site-nav-link{% if request.path == '/config' %} active{% endif %}">config</a>
                {% if show_logout %}
                <a href="/logout" class="nav-link site-nav-link site-nav-logout small ms-sm-auto">logout</a>
                {% endif %}
                {% endif %}
            </div>
        </div>
    </nav>
    {% if dry_run and not setup_mode %}
    <div class="dryrun-banner text-center py-2 px-3 small">
        Dry run is enabled. No actions will be taken on your emails.
        <a href="/config" class="dryrun-banner-link ms-2">Disable in Config &rarr;</a>
    </div>
    {% endif %}
    <div class="container-xl py-4 px-3 px-sm-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
