<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boxwatchr | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="card login-box p-4">
        <div class="login-brand mb-1">boxwatchr</div>
        <div class="text-secondary small mb-4">Email filtering dashboard</div>
        {% if error %}
        <div class="alert alert-danger py-2 px-3 small mb-3">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <label for="password" class="form-label small text-secondary text-uppercase">Password</label>
            <input type="password" id="password" name="password" class="form-control mb-3" autofocus autocomplete="current-password">
            <button type="submit" class="btn btn-primary w-100">Sign in</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
